name: Refresh and deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest feeds
        run: npm run ingest

      - name: Commit refreshed feed data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/data/items.json src/data/status.json
          git diff --cached --quiet || git commit -m "Refresh feed data"
          git push

      - name: Build site
        run: npm run build

      - name: Upload GitHub Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: refresh
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4name: Deploy to GitHub Pages

